---
- hosts: localhost
  connection: local

  vars:

  vars_files:
    - "defaults/main.yml"
    - "vars/{{ ansible_distribution }}.yml"

  tasks:
    - name: Gather facts.
      include_tasks:
        file: tasks/gather-facts.yml
        apply:
          tags:
            - always
      tags:
        - always

    - name: Tasks that require sudo.
      block:
        - name: Pre-setup.
          include_tasks: "tasks/preparation-{{ ansible_distribution }}.yml"

        - name: Install must-have software.
          include_tasks:
            file: "tasks/install-packages.yml"
            apply:
              tags:
                - install-packages
          tags:
            - install-packages

        - name: Sysctl tweaks.
          include_role:
            name: chzerv.sysctl
            apply:
              tags:
                - sysctl
          vars:
            sysctl_required_packages: procps-ng
            sysctl_entries:
              - name: vm.swappiness
                value: 10
              - name: vm.dirty_ratio
                value: 6
              - name: vm.dirty_background_bytes
                value: 4194304
              - name: vm.vfs_cache_pressure
                value: 50
              - name: kernel.sysrq
                value: 1
          when: configure_sysctl | bool
          tags:
            - sysctl

        - name: Security tweaks.
          include_tasks:
            file: tasks/security.yml
            apply:
              tags:
                - security
          when: configure_security | bool
          tags:
            - security

        - name: Performance tuning.
          include_tasks:
            file: tasks/performance.yml
            apply:
              tags:
                - performance
          when: configure_performance | bool
          tags:
            - performance

        - name: Virtualization.
          include_tasks:
            file: tasks/virtualization.yml
            apply:
              tags:
                - virtualization
          tags:
            - virtualization
      become: true

    - name: Misc tweaks
      include_tasks:
        file: tasks/misc.yml
        apply:
          tags:
            - misc
      when: configure_misc | bool
      tags:
        - misc

    - name: Install packages from third-party sources (pip, npm, flatpak).
      include_tasks:
        file: tasks/install-extra-packages.yml
        apply:
          tags:
            - install-extra-packages
      tags:
        - install-extra-packages

    - name: Dotfiles.
      block:
        - name: Clone repo and symlink dotfiles.
          include_tasks: tasks/dotfiles.yml

        - name: Install and setup applications for the selected dotfiles.
          include_tasks: "tasks/dotfiles/{{ item }}.yml"
          with_items: "{{ dotfiles_config_choices }}"
      when: configure_dotfiles | bool
      tags: dotfiles

    - name: GNOME configuration.
      include_tasks:
        file: tasks/gnome-setup.yml
        apply:
          tags:
            - gnome
      when:
        - "'gnome-shell' in installed_packages or 'gnome-shell-performance' in installed_packages"
        - configure_gnome | bool
      tags:
        - gnome
