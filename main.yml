---
- hosts: localhost
  connection: local

  vars:

  vars_files:
    - "vars/default-config.yml"
    - "vars/{{ ansible_distribution }}.yml"

  tasks:
    - name: Tasks that require sudo.
      block:
        - name: Pre-setup.
          include_tasks: "tasks/preparation-{{ ansible_distribution }}.yml"

        - name: Install must-have software.
          include_tasks:
            file: "tasks/install-packages.yml"
            apply:
              tags:
                - install-software
          tags:
            - install-software

        # package_facts does NOT work for pacman (Archlinux)
        - name: Find installed packages (Fedora)
          package_facts:
            manager: auto
          when: ansible_distribution == "Fedora"

        - name: Find installed packages (Archlinux)
          command: pacman -Qn
          register: arch_installed_packages
          no_log: true
          failed_when: false
          changed_when: false
          when: ansible_distribution == "Archlinux"

        - name: Set fact about installed packages in Archlinux.
          set_fact:
            installed_packages: "{{ arch_installed_packages.stdout }}"
          when: ansible_distribution == "Archlinux"

        - name: Set fact about installed packages in Fedora
          set_fact:
            installed_packages: "{{ ansible_facts.packages }}"
          when: ansible_distribution == "Fedora"

        - name: Set capabilities.
          include_tasks:
            file: tasks/capabilities.yml
            apply:
              tags:
                - capabilities
          when: configure_capabilities | bool
          tags:
            - capabilities

        - name: Sysctl tweaks.
          include_role:
              name: chzerv.sysctl
              apply:
                tags:
                  - sysctl
          vars:
            sysctl_required_packages: procps-ng
            sysctl_entries:
            - name: vm.swappiness
              value: 10
            - name: vm.dirty_ratio
              value: 6
            - name: vm.dirty_background_bytes
              value: 4194304
            - name: vm.vfs_cache_pressure
              value: 50
            - name: kernel.sysrq
              value: 1
          when: configure_sysctl | bool
          tags:
            - sysctl

        - name: Performance tuning.
          include_tasks:
            file: tasks/performance.yml
            apply:
              tags:
                - performance
          when: configure_performance | bool
          tags:
            - performance
      become: true

    - name: Install packages from third-party sources (pip, npm, flatpak).
      include_tasks:
        file: tasks/extra-packages.yml
        apply:
          tags:
            - third-party-packages
      tags:
        - third-party-packages

    - name: GNOME configuration.
      include_tasks:
        file: tasks/gnome-setup.yml
        apply:
          tags:
            - gnome
      when:
        - configure_gnome | bool
        - "'gnome-shell' in installed_packages or 'gnome-shell-performance' in installed_packages"
      tags:
        - gnome

    - name: Create custom low resource systemd slice.
      include_tasks:
        file: tasks/systemd-user-setup.yml
        apply:
          tags:
            - systemd
      when: configure_systemd | bool
      tags:
        - systemd

    - name: Dotfiles.
      block:
        - name: Clone repo and symlink dotfiles.
          include_tasks: tasks/dotfiles.yml

        - name: Install and setup applications for the selected dotfiles.
          include_tasks: "tasks/dotfiles/{{ item }}.yml"
          with_items: "{{ dotfiles_config_choices }}"
      when: configure_dotfiles | bool
      tags: dotfiles
