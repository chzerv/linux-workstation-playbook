---
# package_facts does NOT work for pacman (Archlinux)
- name: Find installed packages (Fedora)
  package_facts:
    manager: auto
  when: ansible_distribution == "Fedora"

- name: Find installed packages (Archlinux)
  command: pacman -Qn
  register: arch_installed_packages
  no_log: true
  failed_when: false
  changed_when: false

- name: Set fact about installed packages in Archlinux.
  set_fact:
    installed_packages: "{{ arch_installed_packages.stdout }}"
  when: ansible_distribution == "Archlinux"

- name: Set fact about installed packages in Fedora
  set_fact:
    installed_packages: "{{ ansible_facts.packages }}"
  when: ansible_distribution == "Fedora"

- name: Set capabilities for different programs.
  block:
    - name: Remove the setuid bit from ping.
      file:
        path: /usr/bin/ping
        mode: u-s

    - name: Capabilities for ping
      capabilities:
        path: /usr/bin/ping
        capability: cap_net_raw+p
        state: present

    - name: Capabilities for beep
      capabilities:
        path: /usr/bin/beep
        capability: cap_dac_override,cap_sys_tty_config+ep
        state: present
      when: "'beep' in installed_packages"

    - name: Capabilities for chvt
      capabilities:
        path: /usr/bin/chvt
        capability: cap_dac_read_search,cap_sys_tty_config+ep
        state: present
      when: "'kbd' in installed_packages"

    - name: Capabilities for iftop
      capabilities:
        path: /usr/sbin/iftop
        capability: cap_net_raw+ep
        state: present
      when: "'iftop' in installed_packages"

    - name: Capabilities for mii-tool
      capabilities:
        path: /usr/sbin/mii-tool
        capability: cap_net_admin+ep
        state: present
      when: "'net-tools' in installed_packages"

    - name: Capabilities for mtr-packet
      capabilities:
        path: /usr/bin/mtr-packet
        capability: cap_net_raw+ep
        state: present
      when: "'mtr' in installed_packages"

    - name: Capabilities for nethogs
      capabilities:
        path: /usr/sbin/nethogs
        capability: cap_net_admin,cap_net_raw+ep
        state: present
      when: "'nethogs' in installed_packages"
