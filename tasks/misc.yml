---
- name: Gather facts.
  include_tasks: gather-facts.yml

- name: Ensure ~/.gnupg directory exists.
  file:
    path: "{{ ansible_user_dir }}/.gnupg"
    state: directory
   
- name: Configure gpg agent.
  lineinfile:
    path: "{{ ansible_user_dir }}/.gnupg/gpg-agent.conf"
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    mode: '0644'
    create: true
    backup: true
  with_items:
    - regexp: "^max-cache-ttl"
      line: "max-cache-ttl {{ gpg_agent_max_cache_ttl }}"
    - regexp: "^default-cache-ttl"
      line: "default-cache-ttl {{ gpg_agent_default_cache_ttl }}"

- name: Configure ansible.cfg.
  block:
    - name: Change Ansible roles path.
      lineinfile:
        path: /etc/ansible/ansible.cfg
        regexp: "^#roles_path"
        line: "roles_path = {{ ansible_roles_path }}"
        mode: '0644'

    - name: Change Ansible's remote_tmp path.
      lineinfile:
        path: /etc/ansible/ansible.cfg
        regexp: "^#remote_tmp"
        line: "remote_tmp = /tmp"
        mode: '0644'
  become: true
  when: "'ansible' in installed_packages"

- name: Stop pam_systemd_homed.so spamming the journal when using sudo.
  block:
    - name: Modify pam_unix.so's control so it only jumps one line on success.
      pamd:
        name: system-auth
        type: auth
        control: '[success=2 default=ignore]'
        module_path: pam_unix.so
        new_control: '[success=1 default=ignore]'
        backup: true
      become: true

    - name: Comment out pam_systemd_homed.so line.
      replace:
        path: /etc/pam.d/system-auth
        regexp: '^(-auth\s*[success=1\s default=ignore].*)'
        replace: '# \1'
        backup: true
      become: true
  when:
    - ansible_distribution == "Archlinux"
    - disable_pam_systemd_homed | bool

- name: Add additional kernel parameters (Archlinux, systemd-boot).
  template:
    src: boot/loader/entries/arch.conf.j2
    dest: /boot/loader/entries/arch.conf
    mode: '0755'
    backup: true
  become: true
  when:
    - not grub_is_installed.stat.exists | bool
    - ansible_distribution == "Archlinux"

- name: Add additional kernel parameters (GRUB).
  template:
    src: etc/default/grub.j2
    dest: /etc/default/grub
    mode: '0644'
    backup: true
  become: true
  when:
    - grub_is_installed.stat.exists | bool

- name: Enable rootless podman.
  block:
    - name: Allocate UIDs for the current user.
      lineinfile:
        path: /etc/subuid
        regexp: "^{{ ansible_user_id }}"
        line: "{{ ansible_user_id }}:100000:65536"
        create: true

    - name: Allocate GIDs for the current user's group.
      lineinfile:
        path: /etc/subgid
        regexp: "^{{ ansible_user_id }}"
        line: "{{ ansible_user_id }}:100000:65536"
        create: true
  become: true
  when: enable_rootless_podman | bool
